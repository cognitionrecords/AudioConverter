<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Free browser-based audio format converter. Convert MP3, WAV, FLAC, AIFF — trim, normalize gain, and batch convert. No upload required." />

  <meta property="og:title" content="Audio Format Converter" />
  <meta property="og:description" content="Convert, trim and normalize audio files directly in your browser. No upload, no server." />
  <meta property="og:type" content="website" />

  <title>Audio Format Converter</title>

  <!-- React + Babel via CDN (no build step needed) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin="anonymous"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #0f1117;
      font-family: 'Space Grotesk', sans-serif;
      color: #e2e8f0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .app { min-height: 100vh; padding: 24px 16px 48px; }
    .inner { max-width: 740px; margin: 0 auto; }

    /* ── Header ── */
    .header { margin-bottom: 22px; }
    .header h1 { font-size: 22px; font-weight: 700; color: #38bdf8; letter-spacing: -0.5px; }
    .header p  { font-size: 12px; color: #64748b; margin-top: 3px; }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 4px; margin-bottom: 16px;
      background: #1e293b; padding: 4px; border-radius: 8px; border: 1px solid #2d3f55;
    }
    .tab {
      flex: 1; padding: 8px; border: none; border-radius: 6px;
      font-size: 12px; font-weight: 600; font-family: 'Space Grotesk', sans-serif;
      cursor: pointer; transition: all .15s; color: #64748b; background: transparent;

    .tab.active { background: #0f1117; color: #38bdf8; box-shadow: 0 1px 3px rgba(0,0,0,.4); }
    .tab:hover:not(.active) { color: #94a3b8; }

    /* ── Drop zone ── */
    .drop-zone {
      border: 2px dashed #334155; border-radius: 10px; padding: 32px;
      text-align: center; cursor: pointer; transition: all .2s;
      background: #1e293b; margin-bottom: 16px;
    }
    .drop-zone:hover, .drop-zone.active { border-color: #38bdf8; background: #1e3a52; }
    .drop-zone svg { width: 32px; height: 32px; margin: 0 auto 8px; color: #64748b; display: block; }
    .drop-zone p   { font-size: 13px; color: #cbd5e1; }
    .drop-zone span { font-size: 11px; color: #64748b; }

    /* ── Card ── */
    .card { background: #1e293b; border-radius: 10px; padding: 16px; margin-bottom: 14px; border: 1px solid #2d3f55; }
    .card h3 { font-size: 11px; font-weight: 600; color: #64748b; margin-bottom: 12px; text-transform: uppercase; letter-spacing: .6px; }

    /* ── Info grid ── */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .info-row  { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    .info-row .lbl { color: #64748b; }
    .info-row .val { color: #e2e8f0; font-family: 'JetBrains Mono', monospace; font-size: 11px; }

    /* ── Waveform ── */
    canvas { width: 100%; border-radius: 6px; cursor: crosshair; display: block; }
    .waveform-controls { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .waveform-controls h3 { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .6px; flex: 1; margin-bottom: 0; }
    .time-row { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: #64748b; font-family: 'JetBrains Mono', monospace; }

    /* ── Trim ── */
    .trim-info { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .trim-badge { flex: 1; min-width: 80px; background: #0f1117; border: 1px solid #334155; border-radius: 6px; padding: 6px 10px; }
    .trim-badge .tb-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: .4px; }
    .trim-badge .tb-val   { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: #38bdf8; margin-top: 2px; }
    .trim-reset {
      padding: 5px 10px; background: #0f1117; border: 1px solid #f43f5e;
      border-radius: 6px; font-size: 11px; color: #f43f5e; cursor: pointer;
      font-family: 'Space Grotesk', sans-serif; transition: all .15s; align-self: center;
    }
    .trim-reset:hover { background: rgba(244,63,94,.13); }

    /* ── Gain ── */
    .gain-row { display: flex; align-items: center; gap: 12px; }
    .gain-slider-wrap { flex: 1; }
    .gain-slider { width: 100%; -webkit-appearance: none; appearance: none; height: 5px; border-radius: 3px; outline: none; cursor: pointer; }
    .gain-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #38bdf8; cursor: pointer; border: 2px solid #0f1117; }
    .gain-slider::-moz-range-thumb     { width: 16px; height: 16px; border-radius: 50%; background: #38bdf8; cursor: pointer; border: 2px solid #0f1117; }
    .gain-value { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #38bdf8; min-width: 60px; text-align: right; }
    .gain-presets { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .gain-preset-btn {
      padding: 4px 10px; background: #0f1117; border: 1px solid #334155;
      border-radius: 20px; font-size: 11px; color: #94a3b8; cursor: pointer;
      transition: all .15s; font-family: 'Space Grotesk', sans-serif;
    }
    .gain-preset-btn:hover         { border-color: #38bdf8; color: #e2e8f0; }
    .gain-preset-btn.active        { border-color: #38bdf8; color: #38bdf8; background: #0c2235; }
    .normalize-btn {
      padding: 6px 14px; background: #0f1117; border: 1px solid #38bdf8;
      border-radius: 6px; font-size: 12px; color: #38bdf8; cursor: pointer;
      font-family: 'Space Grotesk', sans-serif; font-weight: 600; transition: all .15s; white-space: nowrap;
    }
    .normalize-btn:hover { background: rgba(56,189,248,.07); }

    /* ── Settings ── */
    .settings-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .settings-header h3 { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 0; }
    .conversion-tag { font-size: 11px; color: #64748b; margin-top: 2px; }
    .conversion-tag .from { color: #f59e0b; }
    .conversion-tag .to   { color: #10b981; }
    .settings-grid   { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .settings-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    label { display: block; font-size: 11px; color: #64748b; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
    select, input[type="text"] {
      width: 100%; background: #0f1117; border: 1px solid #334155; border-radius: 6px;
      padding: 7px 10px; font-size: 12px; color: #e2e8f0;
      font-family: 'Space Grotesk', sans-serif; outline: none; transition: border-color .15s;
      -webkit-appearance: none;
    }
    select:focus, input[type="text"]:focus { border-color: #38bdf8; }
    select option { background: #0f1117; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
      border-radius: 6px; font-size: 12px; font-weight: 600; border: none; cursor: pointer;
      transition: all .15s; font-family: 'Space Grotesk', sans-serif;
    }
    .btn-icon { padding: 6px; border-radius: 6px; border: none; cursor: pointer; transition: all .15s; background: #0f1117; color: #94a3b8; }
    .btn-icon:hover { background: #334155; color: #e2e8f0; }
    .btn-blue  { background: #2563eb; color: white; } .btn-blue:hover  { background: #1d4ed8; }
    .btn-red   { background: #dc2626; color: white; } .btn-red:hover   { background: #b91c1c; }
    .btn-green { background: #059669; color: white; } .btn-green:hover { background: #047857; }
    .btn-main  { width: 100%; justify-content: center; padding: 12px; font-size: 14px; border-radius: 8px; }
    .btn:disabled { background: #334155 !important; color: #64748b !important; cursor: not-allowed; }
    .star-btn  { background: #0f1117; border: none; cursor: pointer; padding: 6px; border-radius: 6px; color: #64748b; transition: all .15s; }
    .star-btn:hover  { background: #334155; }
    .star-btn.active { background: #854d0e; color: #fbbf24; }

    .actions { display: flex; gap: 10px; }
    .actions .btn-main { flex: 1; }

    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Favourites ── */
    .favorites { margin-top: 12px; }
    .fav-tags  { display: flex; flex-wrap: wrap; gap: 6px; }
    .fav-tag   { padding: 4px 10px; background: #0f1117; border: 1px solid #334155; border-radius: 20px; font-size: 11px; color: #94a3b8; cursor: pointer; transition: all .15s; font-family: 'Space Grotesk', sans-serif; }
    .fav-tag:hover { border-color: #38bdf8; color: #e2e8f0; }

    /* ── Batch ── */
    .batch-list { display: flex; flex-direction: column; gap: 8px; }
    .batch-item { background: #0f1117; border: 1px solid #2d3f55; border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
    .batch-item-info { flex: 1; min-width: 0; }
    .batch-item-name { font-size: 12px; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .batch-item-meta { font-size: 11px; color: #64748b; font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
    .batch-status { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
    .status-pending    { background: #1e3a52; color: #64748b; }
    .status-converting { background: #1e3050; color: #38bdf8; animation: pulse 1s ease-in-out infinite; }
    .status-done  { background: #064e3b; color: #10b981; }
    .status-error { background: #450a0a; color: #f87171; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .6; } }
    .batch-remove { background: none; border: none; color: #64748b; cursor: pointer; padding: 4px; border-radius: 4px; transition: all .15s; font-size: 14px; line-height: 1; }
    .batch-remove:hover { color: #f43f5e; background: rgba(45,17,23,.8); }
    .batch-actions { display: flex; gap: 8px; margin-top: 12px; }
    .batch-clear { padding: 8px 14px; background: #0f1117; border: 1px solid #334155; border-radius: 6px; font-size: 12px; color: #64748b; cursor: pointer; font-family: 'Space Grotesk', sans-serif; font-weight: 600; transition: all .15s; }
    .batch-clear:hover { border-color: #f43f5e; color: #f43f5e; }
    .batch-progress { height: 3px; background: #1e293b; border-radius: 2px; margin-top: 10px; overflow: hidden; }
    .batch-progress-bar { height: 100%; background: #38bdf8; border-radius: 2px; transition: width .3s; }
    .empty-batch { text-align: center; padding: 32px; color: #64748b; font-size: 13px; }

    /* ── Footer ── */
    .footer { text-align: center; margin-top: 32px; font-size: 11px; color: #334155; }
    .footer a { color: #38bdf8; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .settings-grid   { grid-template-columns: 1fr 1fr; }
      .settings-grid-2 { grid-template-columns: 1fr; }
      .info-grid       { grid-template-columns: 1fr; }
      .trim-info       { flex-direction: column; }
      .gain-row        { flex-wrap: wrap; }
    }

    .hidden { display: none; }
  </style>

<div id="root"></div>

<script type="text/babel">
  const { useState, useRef, useEffect } = React;

  /* ─── SVG icons ─── */
  const UpIcon    = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
  const PlayIcon  = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
  const PauseIcon = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>;
  const StopIcon  = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18"/></svg>;
  const ZoomInIcon  = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>;
  const ZoomOutIcon = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>;
  const DlIcon    = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
  const StarIcon  = ({ f }) => <svg width="14" height="14" viewBox="0 0 24 24" fill={f ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;

  /* ─── Helpers ─── */
  const fmtTime = s => `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
  const fmtMs   = s => `${Math.floor(s / 60)}:${(s % 60).toFixed(2).padStart(5, '0')}`;
  const fmtSize = b => (b / (1024 * 1024)).toFixed(2) + ' MB';

  /* ─── WAV encoder (browser-native, no server) ─── */
  function bufferToWave(buffer, gainVal, trimStart, trimEnd, sampleRate) {
    const sr          = parseInt(sampleRate);
    const startSample = Math.floor(trimStart * sr);
    const endSample   = Math.floor(trimEnd   * sr);
    const len         = Math.max(1, endSample - startSample);
    const ab          = new ArrayBuffer(len * buffer.numberOfChannels * 2 + 44);
    const view        = new DataView(ab);
    let pos = 0;
    const u16 = d => { view.setUint16(pos, d, true); pos += 2; };
    const u32 = d => { view.setUint32(pos, d, true); pos += 4; };
    u32(0x46464952); u32(ab.byteLength - 8); u32(0x45564157);
    u32(0x20746d66); u32(16); u16(1); u16(buffer.numberOfChannels);
    u32(sr); u32(sr * 2 * buffer.numberOfChannels);
    u16(buffer.numberOfChannels * 2); u16(16);
    u32(0x61746164); u32(len * buffer.numberOfChannels * 2);
    const channels = [];
    for (let i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));
    for (let i = 0; i < len; i++) {
      for (let c = 0; c < buffer.numberOfChannels; c++) {
        let s = Math.max(-1, Math.min(1, (channels[c][startSample + i] || 0) * gainVal));
        view.setInt16(pos, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        pos += 2;
      }
    }
    return new Blob([ab], { type: 'audio/wav' });
  }

  /* ══════════════════════════════════════════════
     SINGLE FILE TAB
  ══════════════════════════════════════════════ */
  function SingleTab() {
    const [file,        setFile]        = useState(null);
    const [drag,        setDrag]        = useState(false);
    const [audioCtx,    setAudioCtx]    = useState(null);
    const [audioBuf,    setAudioBuf]    = useState(null);
    const [waveData,    setWaveData]    = useState([]);
    const [dur,         setDur]         = useState(0);
    const [converting,  setConverting]  = useState(false);
    const [convertedUrl,setConvertedUrl]= useState(null);
    const [isPlaying,   setIsPlaying]   = useState(false);
    const [curTime,     setCurTime]     = useState(0);
    const [zoom,        setZoom]        = useState(1);
    const [outputName,  setOutputName]  = useState('converted');
    const [namePreset,  setNamePreset]  = useState('custom');
    const [favorites,   setFavorites]   = useState([]);
    const [settings,    setSettings]    = useState({ outputFormat: 'wav', bitrate: '320', sampleRate: '44100' });
    const [trimStart,   setTrimStart]   = useState(0);
    const [trimEnd,     setTrimEnd]     = useState(0);
    const [trimMode,    setTrimMode]    = useState(null);   // 'start' | 'end' | null
    const [gain,        setGain]        = useState(1.0);

    const canvasRef    = useRef(null);
    const fileInputRef = useRef(null);
    const srcRef       = useRef(null);
    const startTimeRef = useRef(0);
    const animRef      = useRef(null);

    useEffect(() => () => {
      if (animRef.current) cancelAnimationFrame(animRef.current);
      try { srcRef.current?.stop(); } catch (e) {}
    }, []);

    const FORMATS     = [{ value: 'wav', label: 'WAV' }, { value: 'mp3', label: 'MP3' }, { value: 'aiff', label: 'AIFF' }, { value: 'flac', label: 'FLAC' }];
    const BITRATES    = ['128', '192', '256', '320'];
    const SAMPLERATES = ['44100', '48000', '96000'];
    const NAME_PRESETS= [{ value: 'custom', label: 'Custom' }, { value: 'original', label: 'Original Name' }, { value: 'prefix_date', label: 'Prefix + Date' }, { value: 'prefix_format', label: 'Prefix + Format' }];

    const genName = (p, n) => {
      const base = n ? n.replace(/\.[^/.]+$/, '') : 'converted';
      const date = new Date().toISOString().split('T')[0];
      if (p === 'original')      return base;
      if (p === 'prefix_date')   return `${base}_${date}`;
      if (p === 'prefix_format') return `${base}_${settings.outputFormat}`;
      return outputName;
    };

    const handleFile = async f => {
      if (!f.type.startsWith('audio/')) { alert('Please upload an audio file.'); return; }
      setFile(f); setConvertedUrl(null); setIsPlaying(false); setCurTime(0);
      setOutputName(f.name.replace(/\.[^/.]+$/, ''));
      setGain(1.0); setTrimMode(null);
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        setAudioCtx(ctx);
        const buf = await ctx.decodeAudioData(await f.arrayBuffer());
        setAudioBuf(buf);
        setDur(buf.duration);
        setTrimStart(0); setTrimEnd(buf.duration);
        genWaveform(buf);
      } catch (e) { alert('Could not decode audio. Try a different file.'); }
    };

    const genWaveform = buf => {
      const raw = buf.getChannelData(0);
      const samples = 1000, bs = Math.floor(raw.length / samples);
      const d = [];
      for (let i = 0; i < samples; i++) {
        let s = 0;
        for (let j = 0; j < bs; j++) s += Math.abs(raw[bs * i + j]);
        d.push(s / bs);
      }
      const m = Math.pow(Math.max(...d), -1);
      setWaveData(d.map(n => n * m));
    };

    useEffect(() => { if (waveData.length && canvasRef.current) drawWaveform(); }, [waveData, curTime, zoom, trimStart, trimEnd, dur]);

    const drawWaveform = () => {
      const canvas = canvasRef.current; if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#0f1117'; ctx.fillRect(0, 0, W, H);

      // trim shading
      if (dur > 0) {
        const tsX = (trimStart / dur) * zoom * W;
        const teX = (trimEnd   / dur) * zoom * W;
        ctx.fillStyle = 'rgba(244,63,94,0.10)';
        ctx.fillRect(0, 0, Math.min(tsX, W), H);
        if (teX < W) ctx.fillRect(Math.min(teX, W), 0, W - Math.min(teX, W), H);
      }

      // bars
      const data = waveData.slice(0, Math.floor(waveData.length * zoom));
      const bw   = W / data.length;
      const prog = dur > 0 ? curTime / dur : 0;
      data.forEach((v, i) => {
        const bh = v * H * 0.85, x = i * bw, y = (H - bh) / 2;
        const pct    = i / data.length;
        const inTrim = dur > 0 && pct >= (trimStart / dur * zoom) && pct <= (trimEnd / dur * zoom);
        if (pct < prog * zoom) {
          const g = ctx.createLinearGradient(0, y, 0, y + bh);
          g.addColorStop(0, '#38bdf8'); g.addColorStop(1, '#0ea5e9');
          ctx.fillStyle = g;
        } else if (inTrim) {
          ctx.fillStyle = '#1e3a52';
        } else {
          ctx.fillStyle = '#141c2e';
        }
        ctx.fillRect(x, y, Math.max(bw - 0.5, 0.5), bh);
      });

      // trim handles
      if (dur > 0) {
        const tsX = (trimStart / dur) * zoom * W;
        const teX = (trimEnd   / dur) * zoom * W;
        ctx.strokeStyle = '#f43f5e'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(tsX, 0); ctx.lineTo(tsX, H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(teX, 0); ctx.lineTo(teX, H); ctx.stroke();
        ctx.fillStyle = '#f43f5e';
        ctx.fillRect(tsX - 1, 0, 10, 16);
        ctx.fillRect(teX - 9, 0, 10, 16);
      }

      // playhead
      if (dur > 0) {
        const px = (prog * zoom) * W;
        ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H); ctx.stroke();
      }
    };

    const updateTime = () => {
      if (audioCtx) {
        const el = audioCtx.currentTime - startTimeRef.current;
        setCurTime(el);
        if (el >= Math.min(trimEnd, dur)) handleStop();
        else animRef.current = requestAnimationFrame(updateTime);
      }
    };

    const handlePlay = async () => {
      if (!audioCtx || !audioBuf) return;
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      const src = audioCtx.createBufferSource();
      src.buffer = audioBuf;
      const gainNode = audioCtx.createGain();
      gainNode.gain.value = gain;
      src.connect(gainNode); gainNode.connect(audioCtx.destination);
      const startAt = Math.max(curTime, trimStart);
      src.start(0, startAt);
      srcRef.current = src;
      startTimeRef.current = audioCtx.currentTime - startAt;
      setIsPlaying(true);
      src.onended = () => setIsPlaying(false);
      animRef.current = requestAnimationFrame(updateTime);
    };

    const handlePause = () => {
      try { srcRef.current?.stop(); } catch (e) {}
      setIsPlaying(false);
      if (animRef.current) cancelAnimationFrame(animRef.current);
    };
    const handleStop = () => { handlePause(); setCurTime(trimStart); };

    const handleCanvasClick = e => {
      if (!dur) return;
      const rect = canvasRef.current.getBoundingClientRect();
      const t = ((e.clientX - rect.left) / rect.width / zoom) * dur;
      if (trimMode === 'start') {
        setTrimStart(Math.min(Math.max(0, t), trimEnd - 0.1));
        setTrimMode(null);
      } else if (trimMode === 'end') {
        setTrimEnd(Math.max(Math.min(dur, t), trimStart + 0.1));
        setTrimMode(null);
      } else {
        setCurTime(Math.max(trimStart, Math.min(t, trimEnd)));
        if (isPlaying && srcRef.current) { try { srcRef.current.stop(); } catch (e) {} setIsPlaying(false); }
      }
    };

    const normalize = () => {
      if (!audioBuf) return;
      const raw = audioBuf.getChannelData(0);
      let peak = 0;
      for (let i = 0; i < raw.length; i++) if (Math.abs(raw[i]) > peak) peak = Math.abs(raw[i]);
      if (peak > 0) setGain(parseFloat(Math.min(2, 1.0 / peak).toFixed(2)));
    };

    const handleExport = async () => {
      if (!audioBuf) return;
      setConverting(true);
      await new Promise(r => setTimeout(r, 600));
      try {
        const blob = bufferToWave(audioBuf, gain, trimStart, trimEnd, settings.sampleRate);
        setConvertedUrl(URL.createObjectURL(blob));
      } catch (e) { alert('Export error: ' + e.message); }
      setConverting(false);
    };

    const toggleFav = () => {
      const cur = { format: settings.outputFormat, bitrate: settings.bitrate, sampleRate: settings.sampleRate, namePreset };
      const ex  = favorites.find(f => f.format === cur.format && f.bitrate === cur.bitrate && f.sampleRate === cur.sampleRate);
      if (ex) setFavorites(favorites.filter(f => f !== ex));
      else    setFavorites([...favorites, { ...cur, name: `${cur.format.toUpperCase()} ${cur.bitrate}k` }]);
    };

    const isFav    = favorites.some(f => f.format === settings.outputFormat && f.bitrate === settings.bitrate && f.sampleRate === settings.sampleRate);
    const curName  = namePreset === 'custom' ? outputName : genName(namePreset, file?.name);
    const gainPct  = Math.round(gain * 100);
    const gainDb   = gain === 0 ? '-∞' : (20 * Math.log10(gain)).toFixed(1);
    const gainFill = `linear-gradient(to right,#38bdf8 0%,#38bdf8 ${Math.min(gain / 2, 1) * 100}%,#334155 ${Math.min(gain / 2, 1) * 100}%,#334155 100%)`;

    return (
      <>
        {/* Drop zone */}
        <div className={`drop-zone ${drag ? 'active' : ''}`}
          onDragEnter={e => { e.preventDefault(); e.stopPropagation(); setDrag(true);  }}
          onDragLeave={e => { e.preventDefault(); e.stopPropagation(); setDrag(false); }}
          onDragOver={e  => { e.preventDefault(); e.stopPropagation(); }}
          onDrop={e => { e.preventDefault(); e.stopPropagation(); setDrag(false); if (e.dataTransfer.files?.[0]) handleFile(e.dataTransfer.files[0]); }}
          onClick={() => fileInputRef.current?.click()}>
          <input ref={fileInputRef} type="file" accept="audio/*" className="hidden" onChange={e => e.target.files?.[0] && handleFile(e.target.files[0])} />
          <UpIcon />
          <p>{file ? file.name : 'Drop audio file or click to browse'}</p>
          <span>MP3, WAV, FLAC, AIFF</span>
        </div>

        {file && <>
          {/* File info */}
          <div className="card">
            <h3>Input File</h3>
            <div className="info-grid">
              {[
                ['Filename',    file.name],
                ['Size',        fmtSize(file.size)],
                ['Format',      file.type.split('/')[1]?.toUpperCase() || 'AUDIO'],
                ['Duration',    fmtTime(dur)],
                ['Sample Rate', audioBuf ? `${(audioBuf.sampleRate / 1000).toFixed(1)} kHz` : '—'],
                ['Channels',    audioBuf?.numberOfChannels === 2 ? 'Stereo' : audioBuf?.numberOfChannels === 1 ? 'Mono' : '—'],
                ['Bit Depth',   '16-bit'],
                ['Samples',     audioBuf ? audioBuf.length.toLocaleString() : '—'],
              ].map(([l, v]) => (
                <div className="info-row" key={l}><span className="lbl">{l}</span><span className="val">{v}</span></div>
              ))}
            </div>
          </div>

          {/* Waveform + Trim */}
          <div className="card">
            <div className="waveform-controls">
              <h3>Waveform &amp; Trim</h3>
              <button className="btn-icon" onClick={() => setZoom(Math.max(0.5, zoom - 0.25))}><ZoomOutIcon /></button>
              <button className="btn-icon" onClick={() => setZoom(Math.min(3,   zoom + 0.25))}><ZoomInIcon /></button>
              <button className={`btn ${isPlaying ? 'btn-red' : 'btn-blue'}`} onClick={isPlaying ? handlePause : handlePlay}>
                {isPlaying ? <PauseIcon /> : <PlayIcon />}{isPlaying ? 'Pause' : 'Play'}
              </button>
              <button className="btn" style={{ background: '#334155', color: '#e2e8f0' }} onClick={handleStop}><StopIcon />Stop</button>
            </div>
            <canvas ref={canvasRef} width={1000} height={100} onClick={handleCanvasClick} />
            <div className="time-row">
              <span>{fmtMs(curTime)}</span>
              <span style={{ color: trimMode ? '#f43f5e' : '#64748b' }}>
                {trimMode === 'start' ? '▶ Click waveform to set trim start'
                 : trimMode === 'end' ? '▶ Click waveform to set trim end'
                 : `Zoom ${zoom}×`}
              </span>
              <span>{fmtMs(dur)}</span>
            </div>
            <div className="trim-info">
              <div className="trim-badge"><div className="tb-label">Trim Start</div><div className="tb-val">{fmtMs(trimStart)}</div></div>
              <div className="trim-badge"><div className="tb-label">Trim End</div><div className="tb-val">{fmtMs(trimEnd)}</div></div>
              <div className="trim-badge"><div className="tb-label">Length</div><div className="tb-val">{fmtMs(trimEnd - trimStart)}</div></div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                <button className="btn" style={{ padding: '5px 10px', fontSize: 11, background: trimMode === 'start' ? '#f43f5e' : '#0f1117', border: '1px solid #f43f5e', color: trimMode === 'start' ? 'white' : '#f43f5e' }}
                  onClick={() => setTrimMode(trimMode === 'start' ? null : 'start')}>Set Start</button>
                <button className="btn" style={{ padding: '5px 10px', fontSize: 11, background: trimMode === 'end' ? '#f43f5e' : '#0f1117', border: '1px solid #f43f5e', color: trimMode === 'end' ? 'white' : '#f43f5e' }}
                  onClick={() => setTrimMode(trimMode === 'end' ? null : 'end')}>Set End</button>
              </div>
              <button className="trim-reset" onClick={() => { setTrimStart(0); setTrimEnd(dur); setTrimMode(null); }}>Reset</button>
            </div>
          </div>

          {/* Gain */}
          <div className="card">
            <h3>Volume / Gain</h3>
            <div className="gain-row">
              <div className="gain-slider-wrap">
                <input type="range" className="gain-slider" min="0" max="2" step="0.01" value={gain}
                  style={{ background: gainFill }}
                  onChange={e => setGain(parseFloat(e.target.value))} />
              </div>
              <div className="gain-value">{gainPct}%<span style={{ fontSize: 10, color: '#64748b', display: 'block', textAlign: 'right' }}>{gainDb} dB</span></div>
              <button className="normalize-btn" onClick={normalize}>Auto-Normalize</button>
            </div>
            <div className="gain-presets">
              {[{ label: '-6 dB', v: 0.5 }, { label: '0 dB', v: 1.0 }, { label: '+3 dB', v: 1.41 }, { label: '+6 dB', v: 2.0 }].map(p => (
                <button key={p.label} className={`gain-preset-btn ${Math.abs(gain - p.v) < 0.02 ? 'active' : ''}`} onClick={() => setGain(p.v)}>{p.label}</button>
              ))}
            </div>
          </div>

          {/* Output settings */}
          <div className="card">
            <div className="settings-header">
              <div>
                <h3>Output Settings</h3>
                <div className="conversion-tag">
                  <span className="from">{file.type.split('/')[1]?.toUpperCase() || 'AUDIO'}</span>
                  <span> → </span>
                  <span className="to">{settings.outputFormat.toUpperCase()}</span>
                </div>
              </div>
              <button className={`star-btn ${isFav ? 'active' : ''}`} onClick={toggleFav} title="Save as favourite"><StarIcon f={isFav} /></button>
            </div>
            <div className="settings-grid">
              <div><label>Format</label>
                <select value={settings.outputFormat} onChange={e => setSettings({ ...settings, outputFormat: e.target.value })}>
                  {FORMATS.map(f => <option key={f.value} value={f.value}>{f.label}</option>)}
                </select>
              </div>
              <div><label>Bitrate (kbps)</label>
                <select value={settings.bitrate} onChange={e => setSettings({ ...settings, bitrate: e.target.value })}>
                  {BITRATES.map(b => <option key={b} value={b}>{b}</option>)}
                </select>
              </div>
              <div><label>Sample Rate</label>
                <select value={settings.sampleRate} onChange={e => setSettings({ ...settings, sampleRate: e.target.value })}>
                  {SAMPLERATES.map(s => <option key={s} value={s}>{(parseInt(s) / 1000).toFixed(1)} kHz</option>)}
                </select>
              </div>
            </div>
            <div className="settings-grid-2">
              <div><label>Filename Preset</label>
                <select value={namePreset} onChange={e => { setNamePreset(e.target.value); if (e.target.value !== 'custom') setOutputName(genName(e.target.value, file?.name)); }}>
                  {NAME_PRESETS.map(p => <option key={p.value} value={p.value}>{p.label}</option>)}
                </select>
              </div>
              <div><label>Output Filename</label>
                <input type="text" value={curName} onChange={e => { setOutputName(e.target.value); setNamePreset('custom'); }} placeholder="output" />
              </div>
            </div>
            {favorites.length > 0 && (
              <div className="favorites">
                <label>Favourites</label>
                <div className="fav-tags">
                  {favorites.map((fav, i) => (
                    <button key={i} className="fav-tag" onClick={() => { setSettings({ outputFormat: fav.format, bitrate: fav.bitrate, sampleRate: fav.sampleRate }); setNamePreset(fav.namePreset); }}>{fav.name}</button>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Actions */}
          <div className="actions">
            <button className="btn btn-blue btn-main" onClick={handleExport} disabled={converting}>
              {converting ? <><div className="spinner" />Converting…</> : `Convert to ${settings.outputFormat.toUpperCase()}`}
            </button>
            {convertedUrl && (
              <a href={convertedUrl} download={`${curName}.${settings.outputFormat}`} className="btn btn-green btn-main" style={{ textDecoration: 'none' }}>
                <DlIcon />Download {settings.outputFormat.toUpperCase()}
              </a>
            )}
          </div>
        </>}
      </>
    );
  }

  /* ══════════════════════════════════════════════
     BATCH TAB
  ══════════════════════════════════════════════ */
  function BatchTab() {
    const [items,    setItems]    = useState([]);
    const [drag,     setDrag]     = useState(false);
    const [running,  setRunning]  = useState(false);
    const [settings, setSettings] = useState({ outputFormat: 'wav', bitrate: '320', sampleRate: '44100' });
    const fileInputRef = useRef(null);

    const FORMATS     = [{ value: 'wav', label: 'WAV' }, { value: 'mp3', label: 'MP3' }, { value: 'aiff', label: 'AIFF' }, { value: 'flac', label: 'FLAC' }];
    const BITRATES    = ['128', '192', '256', '320'];
    const SAMPLERATES = ['44100', '48000', '96000'];

    const addFiles = files => {
      const newItems = Array.from(files)
        .filter(f => f.type.startsWith('audio/'))
        .map(f => ({ id: Math.random().toString(36).slice(2), file: f, status: 'pending', url: null }));
      if (!newItems.length) { alert('No supported audio files found.'); return; }
      setItems(prev => [...prev, ...newItems]);
    };

    const removeItem = id => setItems(prev => prev.filter(i => i.id !== id));

    const processAll = async () => {
      const pending = items.filter(i => i.status === 'pending');
      if (!pending.length) return;
      setRunning(true);
      for (const item of pending) {
        setItems(prev => prev.map(i => i.id === item.id ? { ...i, status: 'converting' } : i));
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const buf = await ctx.decodeAudioData(await item.file.arrayBuffer());
          const blob = bufferToWave(buf, 1.0, 0, buf.duration, settings.sampleRate);
          const url  = URL.createObjectURL(blob);
          setItems(prev => prev.map(i => i.id === item.id ? { ...i, status: 'done', url } : i));
          await ctx.close();
        } catch (e) {
          setItems(prev => prev.map(i => i.id === item.id ? { ...i, status: 'error' } : i));
        }
        await new Promise(r => setTimeout(r, 300));
      }
      setRunning(false);
    };

    const doneCount = items.filter(i => i.status === 'done').length;
    const progress  = items.length > 0 ? (doneCount / items.length) * 100 : 0;

    return (
      <>
        <div className={`drop-zone ${drag ? 'active' : ''}`}
          onDragEnter={e => { e.preventDefault(); e.stopPropagation(); setDrag(true);  }}
          onDragLeave={e => { e.preventDefault(); e.stopPropagation(); setDrag(false); }}
          onDragOver={e  => { e.preventDefault(); e.stopPropagation(); }}
          onDrop={e => { e.preventDefault(); e.stopPropagation(); setDrag(false); if (e.dataTransfer.files?.length) addFiles(e.dataTransfer.files); }}
          onClick={() => fileInputRef.current?.click()}>
          <input ref={fileInputRef} type="file" accept="audio/*" multiple className="hidden" onChange={e => e.target.files?.length && addFiles(e.target.files)} />
          <UpIcon />
          <p>Drop multiple audio files or click to browse</p>
          <span>MP3, WAV, FLAC, AIFF — select as many as you like</span>
        </div>

        <div className="card">
          <h3>Output Settings (applied to all files)</h3>
          <div className="settings-grid">
            <div><label>Format</label>
              <select value={settings.outputFormat} onChange={e => setSettings({ ...settings, outputFormat: e.target.value })}>
                {FORMATS.map(f => <option key={f.value} value={f.value}>{f.label}</option>)}
              </select>
            </div>
            <div><label>Bitrate</label>
              <select value={settings.bitrate} onChange={e => setSettings({ ...settings, bitrate: e.target.value })}>
                {BITRATES.map(b => <option key={b} value={b}>{b} kbps</option>)}
              </select>
            </div>
            <div><label>Sample Rate</label>
              <select value={settings.sampleRate} onChange={e => setSettings({ ...settings, sampleRate: e.target.value })}>
                {SAMPLERATES.map(s => <option key={s} value={s}>{(parseInt(s) / 1000).toFixed(1)} kHz</option>)}
              </select>
            </div>
          </div>
        </div>

        <div className="card">
          <h3>Queue {items.length > 0 && `— ${items.length} file${items.length !== 1 ? 's' : ''}`}</h3>
          {items.length === 0 ? (
            <div className="empty-batch">No files added yet. Drop some audio files above.</div>
          ) : (
            <div className="batch-list">
              {items.map(item => (
                <div className="batch-item" key={item.id}>
                  <div className="batch-item-info">
                    <div className="batch-item-name">{item.file.name}</div>
                    <div className="batch-item-meta">{fmtSize(item.file.size)} · {item.file.type.split('/')[1]?.toUpperCase() || 'AUDIO'} → {settings.outputFormat.toUpperCase()}</div>
                  </div>
                  <span className={`batch-status status-${item.status}`}>
                    {item.status === 'pending'    && 'Pending'}
                    {item.status === 'converting' && 'Converting…'}
                    {item.status === 'done'       && '✓ Done'}
                    {item.status === 'error'      && 'Error'}
                  </span>
                  {item.status === 'done' && item.url && (
                    <a href={item.url} download={`${item.file.name.replace(/\.[^/.]+$/, '')}.${settings.outputFormat}`}
                       className="btn btn-green" style={{ textDecoration: 'none', padding: '5px 10px', fontSize: 11 }}><DlIcon />Save</a>
                  )}
                  {!running && <button className="batch-remove" onClick={() => removeItem(item.id)}>✕</button>}
                </div>
              ))}
            </div>
          )}
          {items.length > 0 && <div className="batch-progress"><div className="batch-progress-bar" style={{ width: `${progress}%` }} /></div>}
          {items.length > 0 && (
            <div className="batch-actions">
              <button className="btn btn-blue btn-main" onClick={processAll} disabled={running || !items.some(i => i.status === 'pending')} style={{ flex: 2 }}>
                {running ? <><div className="spinner" />Converting {doneCount}/{items.length}…</> : `Convert All to ${settings.outputFormat.toUpperCase()}`}
              </button>
              <button className="batch-clear" disabled={running} onClick={() => setItems([])}>Clear All</button>
            </div>
          )}
        </div>
      </>
    );
  }

  /* ══════════════════════════════════════════════
     ROOT APP
  ══════════════════════════════════════════════ */
  function App() {
    const [tab, setTab] = useState('single');
    return (
      <div className="app">
        <div className="inner">
          <div className="header">
            <h1>🎵 Audio Format Converter</h1>
            <p>Runs entirely in your browser — no upload, no server, no data leaves your device.</p>
          </div>
          <div className="tabs">
            <button className={`tab ${tab === 'single' ? 'active' : ''}`} onClick={() => setTab('single')}>Single File</button>
            <button className={`tab ${tab === 'batch'  ? 'active' : ''}`} onClick={() => setTab('batch')}>Batch Convert</button>
          </div>
          {tab === 'single' ? <SingleTab /> : <BatchTab />}
          <div className="footer">
            Runs entirely client-side via the <a href="https://developer.mozilla.org/en-US/docs/Web/API/Web_Audio_API" target="_blank" rel="noopener">Web Audio API</a>.
            No files are ever uploaded.
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
